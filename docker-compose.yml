# =============================================================================
# THALES — Multiplayer Computer Docker Stack
# =============================================================================
# Services:
#   - anvil:        Local EVM blockchain for staking/settlement
#   - ollama:       Local LLM inference (mistral, codellama)
#   - web:          WebSocket + HTTP server for real-time collaboration
#   - computer-use: Virtual desktop with screen vision & control APIs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # ANVIL — Local Ethereum Virtual Machine
  # ---------------------------------------------------------------------------
  # Foundry's Anvil provides a fast, deterministic local blockchain.
  # Used for: Token staking, proposal settlement, audit trails
  # ---------------------------------------------------------------------------
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: thales-anvil
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--block-time", "1"]
    ports:
      - "8545:8545"
    volumes:
      - anvil-data:/root/.anvil
    networks:
      - thales-network
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OLLAMA — Local LLM Inference
  # ---------------------------------------------------------------------------
  # Runs local AI models for agents. On Apple Silicon, uses Metal for GPU.
  # Models: mistral:7b, codellama:7b (pulled on first startup)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: thales-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./shared:/workspace:rw
    networks:
      - thales-network
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # WEB SERVER — Real-time Collaboration Hub
  # ---------------------------------------------------------------------------
  # Node.js server providing:
  #   - WebSocket for real-time state sync
  #   - HTTP API for file operations
  #   - Static file serving for frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thales-web
    ports:
      - "3000:3000"
    volumes:
      - ./shared:/workspace:rw
      - ./frontend/src:/app/src:ro
    networks:
      - thales-network
    environment:
      - NODE_ENV=development
      - WORKSPACE_PATH=/workspace
      - ANVIL_RPC_URL=http://anvil:8545
      - OLLAMA_URL=http://ollama:11434
      - COMPUTER_USE_URL=http://computer-use:5001
    depends_on:
      anvil:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # COMPUTER-USE — Virtual Desktop with Vision & Control
  # ---------------------------------------------------------------------------
  # Provides:
  #   - Xvfb virtual display (1280x720)
  #   - Fluxbox window manager
  #   - x11vnc + noVNC for web-based viewing
  #   - REST API for screenshot, mouse, keyboard control
  #   - Firefox, file manager, text editor for testing
  # ---------------------------------------------------------------------------
  computer-use:
    build:
      context: ./computer-use
      dockerfile: Dockerfile
    container_name: thales-computer-use
    ports:
      - "5900:5900"   # VNC
      - "6080:6080"   # noVNC web viewer
      - "5001:5001"   # Control API (5000 used by AirPlay on macOS)
    volumes:
      - ./shared:/workspace:rw
    networks:
      - thales-network
    environment:
      - DISPLAY=:99
      - RESOLUTION=1280x720x24
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  thales-network:
    driver: bridge
    name: thales-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  # Persistent Anvil blockchain data
  anvil-data:
    name: thales-anvil-data

  # Persistent Ollama models
  ollama-data:
    name: thales-ollama-data
